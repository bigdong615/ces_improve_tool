{% extends "base.html" %}
{% block title %}Login - CES Improve Tool{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">🎯 CES Improve Tool</h3>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" required placeholder="engineer@sap.demo">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required placeholder="demo123">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
                <p class="text-muted text-center mt-3 small">Demo: any engineer email / demo123</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
